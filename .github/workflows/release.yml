name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run unit tests
        run: make test

  build-linux:
    name: Build Linux (x86_64, static)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y cmake g++ zlib1g-dev

      - name: Build libgme (static)
        run: |
          git clone --depth 1 https://github.com/libgme/game-music-emu.git build/gme-src
          cmake -S build/gme-src -B build/gme-build \
                -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/build/gme-install \
                -DBUILD_SHARED_LIBS=OFF \
                -DCMAKE_POSITION_INDEPENDENT_CODE=ON
          cmake --build build/gme-build -j$(nproc)
          cmake --install build/gme-build

      - name: Build spc2channels (static)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          make static GME_PREFIX=${{ github.workspace }}/build/gme-install \
            CFLAGS="-O2 -Wall -Wextra -DVERSION='\"${VERSION}\"'"

      - name: Verify binary
        run: |
          ./spc2channels --version
          file spc2channels

      - name: Package
        run: |
          tar czf spc2channels-${GITHUB_REF_NAME}-linux-x86_64.tar.gz \
            spc2channels LICENSE README.md

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: spc2channels-*.tar.gz

  build-macos-arm64:
    name: Build macOS (arm64, static)
    needs: test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build libgme (static)
        run: |
          git clone --depth 1 https://github.com/libgme/game-music-emu.git build/gme-src
          cmake -S build/gme-src -B build/gme-build \
                -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/build/gme-install \
                -DBUILD_SHARED_LIBS=OFF \
                -DCMAKE_POSITION_INDEPENDENT_CODE=ON
          cmake --build build/gme-build -j$(sysctl -n hw.ncpu)
          cmake --install build/gme-build

      - name: Build spc2channels (static)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          make static GME_PREFIX=${{ github.workspace }}/build/gme-install \
            CFLAGS="-O2 -Wall -Wextra -DVERSION='\"${VERSION}\"'"

      - name: Verify binary
        run: ./spc2channels --version

      - name: Package
        run: |
          tar czf spc2channels-${GITHUB_REF_NAME}-macos-arm64.tar.gz \
            spc2channels LICENSE README.md

      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: spc2channels-*.tar.gz

  build-windows:
    name: Build Windows (x86_64, static)
    needs: test
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git
            zip
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-zlib
            make

      - name: Build libgme (static)
        run: |
          git clone --depth 1 https://github.com/libgme/game-music-emu.git build/gme-src
          cmake -S build/gme-src -B build/gme-build \
                -G Ninja \
                -DCMAKE_INSTALL_PREFIX="$(pwd)/build/gme-install" \
                -DBUILD_SHARED_LIBS=OFF \
                -DCMAKE_POSITION_INDEPENDENT_CODE=ON
          cmake --build build/gme-build
          cmake --install build/gme-build

      - name: Build spc2channels (static)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          make static GME_PREFIX="$(pwd)/build/gme-install" \
            CFLAGS="-O2 -Wall -Wextra -DVERSION='\"${VERSION}\"'" \
            TARGET=spc2channels.exe

      - name: Verify binary
        run: ./spc2channels.exe --version

      - name: Package
        run: |
          zip spc2channels-${GITHUB_REF_NAME}-windows-x86_64.zip \
            spc2channels.exe LICENSE README.md

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: spc2channels-*.zip

  release:
    name: Create Release
    needs: [build-linux, build-macos-arm64, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            spc2channels-*.tar.gz
            spc2channels-*.zip
